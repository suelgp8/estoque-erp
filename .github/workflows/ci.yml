name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
      - chore/**
      - hotfix/**
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/estoque_erp?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace backend

      - name: Build workspaces
        run: npm run build
