name: estoque-erp-prod

services:
  postgres:
    image: postgres:16
    container_name: estoque_postgres_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - estoque_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - estoque_prod

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runner
    container_name: estoque_backend_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      DB_HOST: postgres
      PRISMA_MIGRATIONS_PATH: prisma-prod/migrations
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run prisma:migrate:deploy && npm run start"
    expose:
      - "3000"
    networks:
      - estoque_prod

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runner
      args:
        VITE_API_URL: /api
    container_name: estoque_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - estoque_prod

volumes:
  estoque_prod_postgres_data:

networks:
  estoque_prod:
    name: estoque_prod_network
