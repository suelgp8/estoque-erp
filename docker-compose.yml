services:
  postgres:
    image: postgres:16
    container_name: estoque_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: estoque_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d estoque_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: estoque_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/estoque_erp?schema=public
      JWT_SECRET: change_me
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    command: sh -c "npm run prisma:migrate:deploy && npm run start"
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: estoque_frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
