name: estoque-erp-dev

services:
  postgres:
    image: postgres:16
    container_name: estoque_postgres_dev
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - estoque_dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - estoque_dev

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    container_name: estoque_backend_dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      DB_HOST: postgres
      PRISMA_MIGRATIONS_PATH: prisma-prod/migrations
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run prisma:generate --workspace backend && npm run prisma:migrate:deploy --workspace backend && npm run dev --workspace backend"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - estoque_dev_backend_node_modules:/app/node_modules
    networks:
      - estoque_dev

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    container_name: estoque_frontend_dev
    env_file:
      - .env.dev
    depends_on:
      - backend
    command: npm run dev --workspace frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - estoque_dev_frontend_node_modules:/app/node_modules
    networks:
      - estoque_dev

volumes:
  estoque_dev_postgres_data:
  estoque_dev_backend_node_modules:
  estoque_dev_frontend_node_modules:

networks:
  estoque_dev:
    name: estoque_dev_network
